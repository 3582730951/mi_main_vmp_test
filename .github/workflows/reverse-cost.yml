name: reverse-cost

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  automated-reverse-cost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install analysis toolchain
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          bash scripts/audit/install_reverse_tooling.sh --ci
          echo "CAPA_RULES=/tmp/capa-rules" >> "$GITHUB_ENV"

      - name: Build protection and IR evidence
        run: |
          bash tests/core/run_core_tests.sh
          bash tests/core/run_llvm_plugin_test.sh
          python3 scripts/audit/protected_callgraph_audit.py --root .
          bash tests/integration/run_protected_sample_chain.sh
          bash tests/integration/run_release_protected_binary.sh
          bash tests/platform/windows_release_cross_build.sh
          python3 scripts/audit/surface_minimization_audit.py --root .

      - name: Generate objective completion sidecar
        if: always()
        run: |
          python3 scripts/audit/platform_string_residuals.py --root . || true
          python3 scripts/audit/objective_completion_audit.py --root . || true

      - name: Generate automated reverse-cost assessment
        run: |
          python3 scripts/audit/generate_reverse_cost_assessment.py --root .
          python3 scripts/audit/reverse_cost_gate.py --root .

      - name: Upload reverse-cost evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reverse-cost-evidence
          path: |
            docs/qa/reports/reverse-cost-assessment.json
            docs/qa/reports/objective-completion-audit.json
            docs/qa/reports/platform-string-residuals.json
            docs/qa/reports/protected-callgraph.json
            docs/qa/reports/surface-minimization.json
            docs/qa/reports/windows-protected-cross-build.json
            tests/core/.llvm-out/hotspot-callsite.log
            tests/core/.llvm-out/hotspot-callsite.protected.ll
            docs/qa/reports/release-protected-binary.json
            build/windows-protected-cross/**
          if-no-files-found: error
