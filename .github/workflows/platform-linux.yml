name: platform-linux

on:
  pull_request:
    paths:
      - "src/platform/**"
      - "tests/platform/**"
      - "docs/platform/**"
      - ".github/workflows/platform-linux.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  elf-so-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ELF tools
        run: sudo apt-get update && sudo apt-get install -y binutils

      - name: Build and run Linux smoke
        run: tests/platform/linux_smoke.sh

      - name: Hardening metadata
        run: |
          readelf -h build/linux/vmp_platform_smoke
          readelf -d build/linux/libvmp_platform.so
