version: 1
seed: "demo-seed-001"
profile: hardened
targets:
  - name: "license_core"
    match: "function:license_check"
    vm_level: 3
    ollvm:
      split: true
      flatten: true
      bogus_branches: true
      substitution: true
      const_string_encryption: true
    anti_analysis:
      debug: true
      hardware_breakpoints: true
      memory_breakpoints: true
      injection: true
      hooks: true
      root_or_jailbreak: platform
    strings:
      critical:
        - "LICENSE_FIELD_EXAMPLE"
        - "https://license.example.invalid"
platforms:
  windows:
    import_hiding: true
    tls_init: true
  linux:
    symbol_strip: safe
    pie_relro: true
  android:
    abi: ["arm64-v8a", "x86_64"]
    jni_registration: dynamic
  ios:
    no_jit: true
    metadata_policy: reduce
hotspot_analysis:
  enabled: true
  call_site_threshold: 3
  hot_vm_level: 1
  defense_floor: 1
callsite_obfuscation:
  enabled: true
  indirect_thunks: true
  hash_resolver: true
  jump_table: true
  per_callsite_thunks: true
  hide_exports: false
decompiler_traps:
  enabled: true
  intensity: 1
random_stack_backtrace:
  randomized: true
  min_interval_ms: 250
  jitter_ms: 750
  max_frames: 16
